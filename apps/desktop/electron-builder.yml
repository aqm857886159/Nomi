appId: com.nomi.desktop
productName: Nomi
copyright: Copyright © 2025 Nomi

directories:
  output: dist-release
  buildResources: resources

files:
  - "dist/main/**"
  - "dist/preload/**"
  - "dist/renderer/**"
  - "!node_modules/@napi-rs/canvas/prebuilds/**"

asarUnpack:
  - "**/@napi-rs/canvas/**"
  - "**/prisma/engines/**"
  - "**/@prisma/engines/**"

extraResources:
  - from: "../agents-cli/dist"
    to: "agents-cli/dist"
    filter:
      - "**/*.js"
      - "**/*.json"

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

fileAssociations:
  - ext: nomi
    name: Nomi Project
    description: Nomi AI 视频创作项目
    role: Editor

publish:
  provider: github
  releaseType: release
